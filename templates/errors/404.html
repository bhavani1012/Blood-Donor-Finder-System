{% extends 'base.html' %}

{% block title %}404 - Page Not Found | Lifeline AI{% endblock %}

{% block content %}
<div class="container py-5 my-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6 card-premium py-5">
            <i class="fas fa-exclamation-triangle text-danger fa-4x mb-4"></i>
            <h1 class="display-3 mb-2 font-heading">404</h1>
            <h3 class="mb-3 text-white">Page Not Found</h3>
            <p class="text-secondary mb-4">
                The screen or resource you are looking for does not exist or has been archived.
            </p>
            <a href="{{ url_for('main.index') }}" class="btn btn-premium">
                <i class="fas fa-arrow-left me-2"></i> Back to Safety
            </a>
        </div>
    </div>
</div>
{% endblock %}
