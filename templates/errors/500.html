{% extends 'base.html' %}

{% block title %}500 - Internal Server Error | Lifeline AI{% endblock %}

{% block content %}
<div class="container py-5 my-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6 card-premium py-5">
            <i class="fas fa-server text-danger fa-4x mb-4"></i>
            <h1 class="display-3 mb-2 font-heading">500</h1>
            <h3 class="mb-3 text-white">Internal Server Error</h3>
            <p class="text-secondary mb-4">
                The database or application server encountered an unexpected error. Please reload the page or contact support.
            </p>
            <a href="{{ url_for('main.index') }}" class="btn btn-premium">
                <i class="fas fa-home me-2"></i> Return Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
